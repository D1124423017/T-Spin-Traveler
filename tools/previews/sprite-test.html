<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T-Spin Traveler Sprite Sheet Test</title>
    <base href="../../" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23070d18'/%3E%3Cpath d='M32 7 54 32 32 57 10 32Z' fill='%237ee8ff' fill-opacity='.28' stroke='%23d7c2ff' stroke-width='4'/%3E%3Cpath d='M32 17 44 32 32 47 20 32Z' fill='%23b88dff' stroke='%23fff0a6' stroke-width='2'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="tools/previews/sprite-test.css?v=2026-06-15-project-structure" />
  </head>
  <body>
    <main class="sprite-tool" aria-labelledby="sprite-test-title" data-i18n-aria-label="spriteTestToolAria">
      <aside class="sheet-panel" aria-label="Sprite sheets" data-i18n-aria-label="spriteTestSheetPanelAria">
        <div class="panel-head">
          <h1 id="sprite-test-title" data-i18n="spriteTestTitle">精靈表測試</h1>
          <p data-i18n="spriteTestSubtitle">選一張精靈表並播放檢查。</p>
        </div>
        <div class="language-row" aria-label="Language" data-i18n-aria-label="spriteTestLanguageAria">
          <button type="button" data-lang="zh" data-i18n="languageZhShort">中文</button>
          <button type="button" data-lang="en" data-i18n="languageEnShort">EN</button>
        </div>
        <nav class="sheet-list" data-sheet-list aria-label="Sprite sheet list" data-i18n-aria-label="spriteTestSheetListAria"></nav>
      </aside>

      <section class="preview-panel" aria-label="Sprite preview" data-i18n-aria-label="spriteTestPreviewAria">
        <div class="toolbar">
          <button type="button" data-action="play">暫停</button>
          <button type="button" data-action="prev" data-i18n="spriteTestPrev">上一幀</button>
          <button type="button" data-action="next" data-i18n="spriteTestNext">下一幀</button>
          <button type="button" data-action="grid">格線開</button>
          <button type="button" data-action="checker">棋盤格開</button>
        </div>

        <div class="control-grid">
          <label>
            <span data-i18n="spriteTestFrameMs">每幀毫秒</span>
            <input type="number" min="16" max="500" step="1" value="60" data-fps />
          </label>
          <label>
            <span data-i18n="spriteTestScale">預覽倍率</span>
            <input type="range" min="0.5" max="3.5" step="0.1" value="1.7" data-scale />
          </label>
          <label>
            <span data-i18n="spriteTestFrame">幀</span>
            <input type="range" min="0" max="15" step="1" value="0" data-frame />
          </label>
        </div>

        <canvas class="preview-canvas" width="720" height="560" data-preview-canvas></canvas>
        <div class="status-line">
          <strong data-status>Loading</strong>
          <span data-meta></span>
        </div>
        <canvas class="atlas-canvas" width="720" height="280" data-atlas-canvas></canvas>
      </section>
    </main>
    <script type="module" src="src/debug/spriteSheetTest.js?v=2026-06-04-sprite-test"></script>
  </body>
</html>
