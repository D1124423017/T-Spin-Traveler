<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T-Spin Traveler</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell" aria-label="T-Spin Traveler playable prototype">
      <canvas id="game" width="1280" height="720"></canvas>
      <div class="screen-note">
        <span>← → Move</span>
        <span>↓ Soft Drop</span>
        <span>Space Hard Drop</span>
        <span>↑ / X Rotate</span>
        <span>Z Rotate CCW</span>
        <span>A 180°</span>
        <span>Shift / C Hold</span>
        <span id="pause-hint">P Paused</span>
        <span id="music-hint">M Music</span>
      </div>
    </main>
    <script src="data/balance.js"></script>
    <script src="game.js"></script>
  </body>
</html>
